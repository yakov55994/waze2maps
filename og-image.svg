<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c2e4f5"/>
      <stop offset="60%"  stop-color="#b8dff2"/>
      <stop offset="100%" stop-color="#a8d4ec"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.93)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.80)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
    <filter id="icon-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.13)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="60"   cy="60"  r="130" fill="rgba(255,255,255,0.13)"/>
  <circle cx="1160" cy="590" r="170" fill="rgba(255,255,255,0.10)"/>
  <circle cx="1100" cy="80"  r="90"  fill="rgba(255,255,255,0.08)"/>

  <!-- Main card -->
  <rect x="70" y="65" width="1060" height="500" rx="38" fill="url(#card)" filter="url(#shadow)"/>

  <!-- ═══════════════ LEFT — mascots + arrow (x 90–570) ═══════════════ -->

  <!-- Waze mascot -->
  <g transform="translate(100,170)" filter="url(#icon-shadow)">
    <path d="M20 90 Q18 130 60 140 Q102 130 100 90 L100 68 Q100 28 60 28 Q20 28 20 68Z" fill="white" stroke="#dde" stroke-width="1.5"/>
    <path d="M60 28 Q65 10 75 14 Q68 22 60 28Z" fill="white"/>
    <circle cx="44" cy="72" r="13" fill="#1a1f36"/>
    <circle cx="47" cy="68" r="5"  fill="white"/>
    <circle cx="76" cy="72" r="13" fill="#1a1f36"/>
    <circle cx="79" cy="68" r="5"  fill="white"/>
    <path d="M43 96 Q60 114 77 96" stroke="#1a1f36" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M20 95 Q5 105 8 118 Q10 128 22 124"      stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M100 95 Q115 105 112 118 Q110 128 98 124" stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M46 138 Q44 152 38 157" stroke="white" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M74 138 Q76 152 82 157" stroke="white" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="8" cy="121" r="7.5" fill="white"/>
    <text x="60" y="184" font-family="Arial,sans-serif" font-size="14" fill="#7aaccb" text-anchor="middle" font-weight="600">Waze</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(260,284)">
    <rect x="0" y="12" width="100" height="10" rx="5" fill="#3d8fe0" opacity="0.75"/>
    <polygon points="98,0 132,17 98,34" fill="#3d8fe0" opacity="0.9"/>
  </g>

  <!-- Google Maps pin -->
  <g transform="translate(418,158)" filter="url(#icon-shadow)">
    <path d="M60 10 C35 10 12 30 12 56 C12 88 60 160 60 160 C60 160 108 88 108 56 C108 30 85 10 60 10Z" fill="#EA4335"/>
    <path d="M60 10 C35 10 12 30 12 56 C12 70 20 84 30 96 L60 160 C60 160 80 124 92 98" fill="#C62828" opacity="0.18"/>
    <circle cx="60" cy="54" r="28" fill="white"/>
    <path d="M68 52.5H60V57.5H66.8C66.3 59.8 64.2 61.2 60 61.2C55.6 61.2 52 57.8 52 54C52 50.2 55.6 46.8 60 46.8C62 46.8 63.8 47.6 65.1 48.8L68.9 45C66.9 43.2 63.6 42 60 42C52.8 42 47 47.4 47 54C47 60.6 52.8 66 60 66C67.4 66 72 61.2 72 54C72 53.5 72 53 71.9 52.5H68Z" fill="#4285F4"/>
    <text x="60" y="192" font-family="Arial,sans-serif" font-size="14" fill="#7aaccb" text-anchor="middle" font-weight="600">Google Maps</text>
  </g>

  <!-- ═══════════════ RIGHT — text block (x 590–1120) ═══════════════ -->
  <!-- divider -->
  <rect x="590" y="110" width="3" height="420" rx="2" fill="rgba(61,143,224,0.18)"/>

  <!-- Title line 1 — anchored from RIGHT (start = right edge in RTL) -->
  <text x="1100" y="210"
        font-family="Arial,Helvetica,sans-serif"
        font-size="50" font-weight="800"
        fill="#1a3a52"
        text-anchor="start"
        direction="rtl">
    ממיר קישורי Waze
  </text>

  <!-- Title line 2 -->
  <text x="1100" y="275"
        font-family="Arial,Helvetica,sans-serif"
        font-size="50" font-weight="800"
        fill="#3d8fe0"
        text-anchor="start"
        direction="rtl">
    ל‑Google Maps
  </text>

  <!-- Thin separator -->
  <rect x="620" y="300" width="460" height="3" rx="2" fill="#3d8fe0" opacity="0.25"/>

  <!-- Subtitle -->
  <text x="1100" y="348"
        font-family="Arial,Helvetica,sans-serif"
        font-size="27" font-weight="500"
        fill="#3a7ca5"
        text-anchor="start"
        direction="rtl">
    מהיר · חינמי · ללא הורדות
  </text>

  <!-- Feature pills -->
  <!-- pill bg 1 -->
  <rect x="862" y="375" width="218" height="48" rx="24" fill="rgba(61,143,224,0.13)"/>
  <text x="971" y="406"
        font-family="Arial,sans-serif" font-size="19"
        fill="#2d6fa0" text-anchor="middle" font-weight="600">&#x2713; פותח ניווט</text>

  <!-- pill bg 2 -->
  <rect x="625" y="375" width="220" height="48" rx="24" fill="rgba(61,143,224,0.13)"/>
  <text x="735" y="406"
        font-family="Arial,sans-serif" font-size="19"
        fill="#2d6fa0" text-anchor="middle" font-weight="600">&#x2713; ישיר לדפדפן</text>

  <!-- pill bg 3 -->
  <rect x="862" y="440" width="218" height="48" rx="24" fill="rgba(61,143,224,0.13)"/>
  <text x="971" y="471"
        font-family="Arial,sans-serif" font-size="19"
        fill="#2d6fa0" text-anchor="middle" font-weight="600">&#x2713; ללא הרשמה</text>

  <!-- ── Footer ── -->
  <rect x="70" y="538" width="1060" height="27" rx="0" fill="rgba(61,143,224,0.07)"/>
  <text x="600" y="558"
        font-family="Arial,sans-serif" font-size="17"
        fill="#8ab4cc" text-anchor="middle">
    Created by YakovCohen
  </text>
</svg>
